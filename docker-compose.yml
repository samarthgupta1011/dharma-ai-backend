##############################################################################
# docker-compose.yml
# ──────────────────
# Spins up a LOCAL development environment with:
#   • mongo  – MongoDB 7 (mimics Cosmos DB API for MongoDB).
#   • api    – The FastAPI app in hot-reload mode.
#
# Usage:
#   docker-compose up -d          # Start in background
#   docker-compose logs -f api    # Tail API logs
#   docker-compose down -v        # Stop and delete volumes
#
# The `api` service mounts ./app as a volume so code changes are reflected
# instantly without rebuilding the image (hot-reload via --reload flag).
##############################################################################

services:
  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: dharma_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"    # Expose locally for MongoDB Compass / mongosh
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: dharma_db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── FastAPI (Dharma AI Backend) ──────────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime         # Use the runtime stage from the multi-stage Dockerfile
    container_name: dharma_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env                  # Optional: override with a local .env file
    environment:
      APP_ENV: local
      MONGODB_URL: mongodb://mongo:27017
      DATABASE_NAME: dharma_db
      # ⚠️  Change this value before deploying anywhere — even staging!
      JWT_SECRET_KEY: local-dev-secret-key-change-me-before-deploying
      DEBUG: "true"
      LOG_LEVEL: debug
      WORKERS: "1"            # Single worker for hot-reload compatibility
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      # Mount source for hot-reload — no rebuild needed during development.
      - ./app:/app/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug

volumes:
  mongo_data:
    driver: local
