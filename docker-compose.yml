##############################################################################
# docker-compose.yml
# ──────────────────
# Spins up a LOCAL development environment with:
#   • cosmos-emulator – Azure Cosmos DB Emulator (MongoDB API on port 10255).
#   • api             – The FastAPI app in hot-reload mode.
#
# Why the emulator instead of plain MongoDB?
#   The Cosmos DB Emulator (API for MongoDB 4.0) replicates the exact wire
#   protocol, index limitations, and RU behaviour of production Cosmos DB.
#   Using it locally eliminates the "works on Mongo, breaks on Cosmos" class
#   of bugs that show up only after deployment.
#
# ⚠️  First-run note:
#   The emulator image is ~2 GB and takes 60–120 seconds to initialise.
#   `docker-compose up` will appear to hang while the healthcheck waits —
#   this is normal.  Watch progress with: docker-compose logs -f cosmos-emulator
#
# Usage:
#   docker-compose up -d                        # Start in background
#   docker-compose logs -f cosmos-emulator      # Watch emulator startup
#   docker-compose logs -f api                  # Tail API logs
#   docker-compose exec api python -m scripts.seed_data
#   docker-compose down -v                      # Stop and delete volumes
#
# Data Explorer (Cosmos DB UI):
#   https://localhost:8081/_explorer/index.html  (accept the self-signed cert)
##############################################################################

services:

  # ── Azure Cosmos DB Emulator (MongoDB API) ────────────────────────────────
  cosmos-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    platform: linux/amd64          # Image is amd64-only; Rosetta handles Apple Silicon
    container_name: dharma_cosmos_emulator
    restart: unless-stopped
    environment:
      # Enable the MongoDB-compatible wire protocol endpoint on port 10255.
      AZURE_COSMOS_EMULATOR_ENABLE_MONGODB_ENDPOINT: "4.0"
      # Partition count — 10 is enough for local dev and keeps memory usage low.
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: "10"
      # Bind to all container interfaces so the api service can reach it.
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: "0.0.0.0"
    ports:
      - "8081:8081"      # Data Explorer UI — visit https://localhost:8081/_explorer/index.html
      - "10255:10255"    # MongoDB API endpoint (TLS, exposed for host-machine access)
    volumes:
      - cosmos_data:/tmp/cosmos/appdata   # Persist collections across container restarts
    mem_limit: 3g        # Emulator requires ≥ 2 GB RAM; 3 g gives comfortable headroom
    healthcheck:
      # The emulator publishes its self-signed certificate at this path once ready.
      # -k skips TLS verification (self-signed cert); -f fails on HTTP errors.
      test: ["CMD-SHELL", "curl -f -k https://localhost:8081/_explorer/emulator.pem > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20          # Up to 5 minutes total wait (20 × 15 s)
      start_period: 60s    # Don't count failures during first 60 s of startup

  # ── FastAPI (Dharma AI Backend) ───────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime         # Use the runtime stage from the multi-stage Dockerfile
    container_name: dharma_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env                  # Optional: local overrides (gitignored)
    environment:
      APP_ENV: local
      # Cosmos DB Emulator connection string (MongoDB API).
      # Breakdown:
      #   username  = "localhost"  (emulator's fixed account name)
      #   password  = default emulator key (URL-encoded)
      #   host      = cosmos-emulator  (Docker service name, resolved by Docker DNS)
      #   port      = 10255  (MongoDB TLS endpoint)
      #   ssl=true + tlsAllowInvalidCertificates=true  → accept self-signed cert
      #   replicaSet=globaldb + retrywrites=false       → required by Cosmos DB protocol
      MONGODB_URL: "mongodb://localhost:C2y6yDjf5%2FR%2Bob0N8A7Cgv30VRDJIWEHLM%2B4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMcszchPhKzdKk%3D%3D@cosmos-emulator:10255/dharma_db?ssl=true&replicaSet=globaldb&retrywrites=false&maxIdleTimeMS=120000&tlsAllowInvalidCertificates=true"
      DATABASE_NAME: dharma_db
      # ⚠️  Change this before deploying anywhere — even to staging!
      JWT_SECRET_KEY: local-dev-secret-key-change-me-before-deploying
      DEBUG: "true"
      LOG_LEVEL: debug
      WORKERS: "1"            # Single worker for hot-reload compatibility
    depends_on:
      cosmos-emulator:
        condition: service_healthy   # Wait until emulator passes health check
    volumes:
      # Mount source for instant hot-reload — no rebuild needed during dev.
      - ./app:/app/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug

volumes:
  cosmos_data:
    driver: local
