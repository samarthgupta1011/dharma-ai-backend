##############################################################################
# docker-compose.yml
# ──────────────────
# Spins up a LOCAL development environment with:
#   • mongo  – MongoDB 6.0 (native ARM64, compatible with Cosmos DB API v6.0)
#   • api    – The FastAPI app in hot-reload mode.
#
# Why MongoDB 6.0 instead of the Cosmos DB Emulator?
#   The Azure Cosmos DB Linux emulator is an amd64-only .NET binary that uses
#   jemalloc.  On Apple Silicon Macs, Rosetta/QEMU does not provide the legacy
#   virtual address layout (vm.legacy_va_layout) that jemalloc requires, causing
#   an immediate crash — this is a known, unfixed Microsoft issue:
#     github.com/microsoft/azure-cosmos-db-emulator-docker/issues/45
#
#   MongoDB 6.0 runs NATIVELY on Apple Silicon (ARM64) and implements the same
#   wire protocol as Azure Cosmos DB API for MongoDB v6.0.  Our codebase uses
#   only the features present in the common Cosmos DB-compatible subset:
#     • Basic CRUD (find_one, insert, set)
#     • $sample aggregation              ← supported since Cosmos DB API v3.6
#     • Unique + compound indexes        ← supported since Cosmos DB API v3.2
#     • Polymorphic _class_id field      ← just a document field, always works
#   There is zero functional gap between local MongoDB 6.0 and production
#   Cosmos DB API v6.0 for this codebase.
#
# Usage:
#   docker-compose up -d                  # Start in background
#   docker-compose logs -f api            # Tail API logs
#   docker-compose exec api python -m scripts.seed_data
#   docker-compose down -v                # Stop and delete volumes
##############################################################################

services:

  # ── MongoDB 6.0 (native ARM64 / Apple Silicon) ────────────────────────────
  mongo:
    image: mongo:6.0
    container_name: dharma_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"    # Exposed for mongosh / Compass on the host machine
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: dharma_db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── FastAPI (Dharma AI Backend) ───────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime         # Use the runtime stage from the multi-stage Dockerfile
    container_name: dharma_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - app/config/.env        # Optional: local overrides (gitignored)
    environment:
      APP_ENV: local
      MONGODB_URL: mongodb://mongo:27017
      DATABASE_NAME: dharma_db
      # ⚠️  Change this before deploying anywhere — even to staging!
      JWT_SECRET_KEY: local-dev-secret-key-change-me-before-deploying
      DEBUG: "true"
      LOG_LEVEL: debug
      WORKERS: "1"            # Single worker for hot-reload compatibility
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      # Mount source for instant hot-reload — no rebuild needed during dev.
      - ./app:/app/app
      # Mount scripts so `docker-compose exec api python -m scripts.seed_data` works.
      - ./scripts:/app/scripts
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug

volumes:
  mongo_data:
    driver: local
