name: Build and Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  id-token: write  # For OpenID Connect (OIDC) in future

jobs:
  # ── Website deployment (Azure Static Web Apps) ──────────────────────────────
  deploy-website:
    name: Deploy Website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy website to Static Web Apps
        run: |
          DEPLOY_TOKEN=$(az staticwebapp secrets list \
            --name dharma-website \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query "properties.apiKey" -o tsv)
          npx --yes @azure/static-web-apps-cli deploy ./website \
            --deployment-token "$DEPLOY_TOKEN" \
            --env production
          echo "✅ Website deployed to Azure Static Web Apps"

  # ── Backend build ───────────────────────────────────────────────────────────
  build:
    name: Build and Push to ACR
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set image tag
        id: meta
        run: |
          # Use commit SHA for image tag (enables rollback)
          echo "tags=${{ vars.ACR_NAME }}.azurecr.io/dharma-api:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "tags_latest=${{ vars.ACR_NAME }}.azurecr.io/dharma-api:latest" >> $GITHUB_OUTPUT

      - name: Build and push image to ACR
        run: |
          # Build image and push to Azure Container Registry
          # Using ACR Tasks (no local Docker daemon needed)
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image dharma-api:${{ github.sha }} \
            --image dharma-api:latest \
            --file Dockerfile \
            .

      - name: Log successful build
        run: |
          echo "✅ Docker image built and pushed to ACR"
          echo "   Registry: ${{ vars.ACR_NAME }}"
          echo "   Image: dharma-api:${{ github.sha }}"
          echo "   Also tagged as: dharma-api:latest"

  deploy:
    name: Deploy to Container Apps
    needs: build
    runs-on: ubuntu-latest
    environment: production  # Requires approval to proceed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Managed Identity client ID
        id: umsi
        run: |
          # Get the client ID of the user-assigned managed identity
          CLIENT_ID=$(az identity show \
            --name dharma-env-umsi \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query clientId \
            --output tsv)
          echo "client-id=${CLIENT_ID}" >> $GITHUB_OUTPUT

      - name: Parse prod.env and prepare environment variables
        id: env-vars
        run: |
          # Extract environment variables from prod.env
          # Remove comments and empty lines, build space-separated list
          ENV_VARS=$(grep -v '^#' app/config/prod.env | grep -v '^$' | tr '\n' ' ')
          echo "vars=${ENV_VARS}" >> $GITHUB_OUTPUT
          echo "✅ Parsed prod.env environment variables"

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image "${{ vars.ACR_NAME }}.azurecr.io/dharma-api:${{ github.sha }}" \
            --set-env-vars \
              ${{ steps.env-vars.outputs.vars }} \
              AZURE_CLIENT_ID=${{ steps.umsi.outputs.client-id }} \
            --output table

      - name: Verify deployment
        run: |
          APP="${{ vars.CONTAINER_APP_NAME }}"
          RG="${{ vars.RESOURCE_GROUP }}"

          # ── 1. Get the latest revision name ─────────────────────────────────
          echo "⏳ Getting latest revision..."
          LATEST_REV=$(az containerapp revision list \
            --name "$APP" --resource-group "$RG" \
            --query "sort_by([],&properties.createdTime)[-1].name" \
            --output tsv)
          echo "   Latest revision: ${LATEST_REV}"

          # ── 2. Wait for the NEW revision to provision (up to 5 min) ─────────
          echo "⏳ Checking revision provisioning state..."
          for i in $(seq 1 30); do
            STATE=$(az containerapp revision show \
              --name "$APP" --resource-group "$RG" \
              --revision "$LATEST_REV" \
              --query "properties.runningState" --output tsv)

            if [ "$STATE" = "Running" ]; then
              echo "✅ Revision ${LATEST_REV} is Running"
              break
            elif [ "$STATE" = "Failed" ] || [ "$STATE" = "ActivationFailed" ]; then
              echo "❌ Revision ${LATEST_REV} FAILED (state: ${STATE})"
              echo ""
              echo "── Container logs ──"
              az containerapp logs show \
                --name "$APP" --resource-group "$RG" \
                --revision "$LATEST_REV" --tail 50 2>&1 || true
              exit 1
            fi

            echo "   Attempt $i/30 — state: ${STATE}… retrying in 10s"
            sleep 10
          done

          if [ "$STATE" != "Running" ]; then
            echo "❌ Revision ${LATEST_REV} did not reach 'Running' within 5 minutes (last state: ${STATE})"
            az containerapp logs show \
              --name "$APP" --resource-group "$RG" \
              --revision "$LATEST_REV" --tail 50 2>&1 || true
            exit 1
          fi

          # ── 3. HTTP health check against the FQDN ──────────────────────────
          FQDN=$(az containerapp show \
            --name "$APP" --resource-group "$RG" \
            --query "properties.configuration.ingress.fqdn" --output tsv)
          echo "⏳ Running HTTP health check on https://${FQDN}/health ..."

          for i in $(seq 1 6); do
            BODY=$(curl -s --max-time 10 "https://${FQDN}/health" || true)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://${FQDN}/health" || true)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed (HTTP 200)"
              echo "   Response: ${BODY}"
              echo "   URL: https://${FQDN}"
              exit 0
            fi
            echo "   Attempt $i/6 — HTTP ${HTTP_CODE}… retrying in 10s"
            sleep 10
          done

          echo "❌ HTTP health check failed (last code: ${HTTP_CODE})"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Container App** | ${{ vars.CONTAINER_APP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Resource Group** | ${{ vars.RESOURCE_GROUP }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry** | ${{ vars.ACR_NAME }}.azurecr.io |" >> $GITHUB_STEP_SUMMARY

      - name: Handle deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo ""
          echo "Common issues and fixes:"
          echo "1. AZURE_CREDENTIALS invalid: Regenerate Service Principal"
          echo "2. ACR_NAME/RESOURCE_GROUP not set: Check GitHub Variables"
          echo "3. Container App environment variables invalid: Check prod.env syntax"
          echo "4. UMSI not found: Ensure 'dharma-env-umsi' exists in your Managed Identity"
          echo ""
          echo "For manual debugging:"
          echo "  az containerapp logs show -n ${{ vars.CONTAINER_APP_NAME }} -g ${{ vars.RESOURCE_GROUP }} --follow"
