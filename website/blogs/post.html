<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myDharma — Blog</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<link rel="icon" href="../assets/icons/favicon-32.svg" sizes="32x32" type="image/svg+xml">
<link rel="icon" href="../assets/icons/favicon-16.svg" sizes="16x16" type="image/svg+xml">
<link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.svg">
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      <img class="nav-brand-logo" src="../assets/icons/logos/logo-horizontal.svg" alt="myDharma" height="48">
    </a>
    <ul class="nav-links">
      <li><a href="/" class="nav-link">Home</a></li>
      <li><a href="/blogs/" class="nav-link active">Blogs</a></li>
      <li><a href="/investors.html" class="nav-link">Investors</a></li>
      <li><a href="/contact.html" class="nav-link">Contact</a></li>
      <li><a href="/#waitlist" class="nav-cta">Join Waitlist</a></li>
    </ul>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">
  <a href="/" onclick="closeMenu()">Home</a>
  <a href="/blogs/" onclick="closeMenu()">Blogs</a>
  <a href="/investors.html" onclick="closeMenu()">Investors</a>
  <a href="/contact.html" onclick="closeMenu()">Contact</a>
  <a href="/#waitlist" class="nav-cta-mobile" onclick="closeMenu()">Join Waitlist</a>
</div>

<!-- BLOG POST -->
<article class="blog-post-page" id="blogPost">
  <div class="blog-post-header fade-up">
    <a href="/blogs/" class="blog-back-link">← Back to Blog</a>
    <span class="blog-post-date" id="postDate"></span>
    <h1 class="section-title" id="postTitle">Loading...</h1>
  </div>
  <div class="blog-content" id="postContent">
    <p class="blog-loading">Loading post...</p>
  </div>
</article>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <div class="footer-brand">
      <img class="footer-brand-logo" src="../assets/icons/logos/logo-horizontal.svg" alt="myDharma" height="40">
    </div>
    <div class="footer-nav">
      <a href="/">Home</a>
      <a href="/blogs/">Blogs</a>
      <a href="/investors.html">Investors</a>
      <a href="/contact.html">Contact</a>
    </div>
    <span class="footer-copy">&copy; 2026 myDharma. All rights reserved.</span>
  </div>
</footer>

<script src="../js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(async function loadBlogPost() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');

  if (!slug) {
    document.getElementById('postTitle').textContent = 'Post not found';
    document.getElementById('postContent').innerHTML = '<p>No post specified. <a href="/blogs/">Browse all posts</a>.</p>';
    return;
  }

  try {
    // Load manifest to get metadata
    const manifestRes = await fetch('manifest.json');
    const posts = await manifestRes.json();
    const post = posts.find(p => p.slug === slug);

    if (post) {
      document.title = `${post.title} — myDharma Blog`;
      document.getElementById('postTitle').textContent = post.title;
      document.getElementById('postDate').textContent = new Date(post.date).toLocaleDateString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    // Load and render markdown
    const mdRes = await fetch(`posts/${encodeURIComponent(slug)}.md`);
    if (!mdRes.ok) throw new Error('Post not found');

    const md = await mdRes.text();
    document.getElementById('postContent').innerHTML = marked.parse(md);

  } catch {
    document.getElementById('postTitle').textContent = 'Post not found';
    document.getElementById('postContent').innerHTML = '<p>This post could not be loaded. <a href="/blogs/">Browse all posts</a>.</p>';
  }
})();
</script>

</body>
</html>
